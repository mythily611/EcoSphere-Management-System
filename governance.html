<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Governance</title>

<style>
body{
font-family:Arial;
background:#eef5ee;
margin:0;
}

header{
background:#1B5E20;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:20px 0;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.score{
font-size:40px;
color:green;
font-weight:bold;
}
</style>

</head>

<body>

<header>

<h1>🏛 Governance Dashboard</h1>

</header>

<div class="container">

<div class="card">

<h2>Compliance Score</h2>

<div class="score">95%</div>

<p>Company follows ESG governance regulations.</p>

</div>

<div class="card">

<h2>Board Members</h2>

<ul>

<li>CEO</li>

<li>Chief Sustainability Officer</li>

<li>Independent Director</li>

<li>Finance Director</li>

</ul>

</div>

<div class="card">

<h2>Business Ethics</h2>

<p>✔ Anti-Corruption Policy</p>

<p>✔ Code of Conduct</p>

<p>✔ Risk Management</p>

<p>✔ Transparency</p>

</div>

</div>

</body>

</html>
